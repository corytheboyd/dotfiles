services:
  archlinux:
    image: lopsided/archlinux:latest
    init: true
    volumes:
      - ../:/chezmoi-corytheboyd:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        pacman -Sy --noconfirm chezmoi
        cp -r /chezmoi-corytheboyd /tmp/chezmoi-src
        chezmoi init --one-shot --source /tmp/chezmoi-src
        /bin/bash
