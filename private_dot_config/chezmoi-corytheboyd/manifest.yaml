vscode:
  extensions:
    - "Anthropic.claude-code"
    - "DavidAnson.vscode-markdownlint"
    - "editorconfig.editorconfig"
    - "hverlin.mise-vscode"
    - "mkhl.shfmt"
    - "mousavian.ssh-config-syntax-highlighter"
    - "k--kato.intellij-idea-keybindings"
    - "redhat.vscode-yaml"
    - "Shopify.ruby-lsp"
    - "sumneko.lua"
    - "tamasfe.even-better-toml"
    - "timonwong.shellcheck"

darwin:
  homebrew:
    brews:
      # System
      - "7zip"
      - "chezmoi"
      - "curl"
      - "fzf"
      - "git"
      - "htop"
      - "jless"
      - "jq"
      - "pinentry-mac"
      - "rbw"
      - "ripgrep"
      - "starship"
      - "tailscale"
      - "tree"
      - "wget"
      - "zsh-syntax-highlighting"
      # Development
      - "age"
      - "colima"
      - "docker"
      - "docker-buildx"
      - "docker-compose"
      - "docker-credential-helper"
      - "lazygit"
      - "mise"
      - "neovim"
      - "shfmt"
      - "sops"
      # Ruby
      - "gmp"
      - "libyaml"

  casks:
    # Desktop
    - "alfred"
    - "audacity"
    - "bitwarden"
    - "claude"
    - "claude-code"
    - "cyberduck"
    - "firefox"
    - "ghostty"
    - "google-chrome"
    - "jetbrains-toolbox"
    - "monodraw"
    - "mullvad-vpn"
    - "obsidian"
    - "rectangle"
    - "scroll-reverser"
    - "shottr"
    - "signal"
    - "transmission"
    - "ungoogled-chromium"
    - "vlc"
    - "zen"
    - "zoom"
